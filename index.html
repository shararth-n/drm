<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Selfish Soda</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html, body {
      width: 100%; height: 100%; height: 100dvh;
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    #playerWrap {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; overflow: hidden;
    }
    #loadScreen {
      position: absolute; inset: 0; z-index: 50; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      transition: opacity 0.6s ease;
    }
    #loadScreen.hidden { opacity: 0; pointer-events: none; }
    .spinner-wrap { position: relative; width: 52px; height: 52px; }
    .spinner-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid transparent; animation: spin 1s linear infinite;
    }
    .spinner-ring.outer { border-top-color: rgba(255,255,255,0.85); border-right-color: rgba(255,255,255,0.2); }
    .spinner-ring.inner { inset: 8px; border-bottom-color: rgba(255,255,255,0.5); animation-direction: reverse; animation-duration: 0.7s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-label { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.35); letter-spacing: 1.8px; text-transform: uppercase; }
    .load-sub { font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.5px; margin-top: -16px; }
    #errorScreen {
      position: absolute; inset: 0; z-index: 60; background: #080808;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; padding: 36px;
    }
    .err-ring {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1.5px solid rgba(239,68,68,0.35); background: rgba(239,68,68,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .err-ring svg { width: 22px; height: 22px; fill: #ef4444; }
    .err-title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.8); }
    .err-detail { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.7; max-width: 260px; }
    .retry-btn {
      margin-top: 6px; padding: 11px 28px; border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.65); font-size: 13px; cursor: pointer;
    }
    .retry-btn:active { background: rgba(255,255,255,0.1); }
    #vdoFrame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; background: #000; opacity: 0; transition: opacity 0.6s ease;
    }
    #vdoFrame.ready { opacity: 1; }
    .shield { position: absolute; z-index: 5; background: transparent; pointer-events: none; }
    .s-top   { top:0; left:0; right:0; height:65px; }
    .s-right { top:0; right:0; bottom:0; width:65px; }
    #drmBadge {
      position: absolute;
      top: max(env(safe-area-inset-top, 0px), 16px);
      left: 16px; z-index: 20;
      display: flex; align-items: center; gap: 7px;
      background: rgba(0,0,0,0.6); border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 30px; padding: 5px 13px 5px 9px;
      opacity: 0; transition: opacity 0.5s 0.6s;
    }
    #drmBadge.show { opacity: 1; }
    .shield-icon { width: 14px; height: 14px; fill: #22c55e; }
    .drm-text { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.6px; text-transform: uppercase; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; margin-left: 2px; animation: blinkDot 2.5s ease-in-out infinite; }
    @keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #lockBar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 40px 18px max(env(safe-area-inset-bottom,0px),18px);
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex; align-items: flex-end; justify-content: space-between;
      pointer-events: none; opacity: 0; transition: opacity 0.5s 0.6s;
    }
    #lockBar.show { opacity: 1; }
    .lock-left { display:flex; align-items:center; gap:5px; }
    .lock-left svg { width:11px; height:11px; fill:rgba(255,255,255,0.3); }
    .lock-left span { font-size:10px; color:rgba(255,255,255,0.28); letter-spacing:0.3px; }
    .wv-badge {
      display:flex; align-items:center; gap:5px;
      background:rgba(0,0,0,0.55); border:0.5px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:5px 11px;
    }
    .wv-badge svg { width:12px; height:12px; fill:rgba(255,255,255,0.45); }
    .wv-badge span { font-size:10px; color:rgba(255,255,255,0.45); font-weight:600; letter-spacing:0.5px; }
    #devWall {
      position: fixed; inset: 0; z-index: 100; background: #000;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; padding: 32px;
    }
    #devWall svg { width: 48px; height: 48px; fill: #ef4444; }
    #devWall p { font-size:13px; color:rgba(255,255,255,0.38); text-align:center; line-height:1.65; max-width:230px; }
  </style>
</head>
<body>
<div id="playerWrap" oncontextmenu="return false">
  <div id="loadScreen">
    <div class="spinner-wrap">
      <div class="spinner-ring outer"></div>
      <div class="spinner-ring inner"></div>
    </div>
    <span class="load-label">Securing Stream</span>
    <span class="load-sub">Widevine · FairPlay DRM</span>
  </div>
  <div id="errorScreen">
    <div class="err-ring">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    </div>
    <div class="err-title">Playback Failed</div>
    <div class="err-detail" id="errMsg">Could not load the secure stream.</div>
    <button class="retry-btn" onclick="initPlayer()">Try Again</button>
  </div>
  <iframe id="vdoFrame" allow="encrypted-media; autoplay; fullscreen" allowfullscreen></iframe>
  <div class="shield s-top" oncontextmenu="return false"></div>
  <div class="shield s-right" oncontextmenu="return false"></div>
  <div id="drmBadge">
    <svg class="shield-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
    <span class="drm-text">DRM Protected</span>
    <div class="live-dot"></div>
  </div>
  <div id="lockBar">
    <div class="lock-left">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      <span>Widevine · FairPlay Encrypted · No Download</span>
    </div>
    <div class="wv-badge">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
      <span>DRM</span>
    </div>
  </div>
</div>
<div id="devWall">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
  <p>Playback paused.<br/>Close developer tools to resume.</p>
</div>
<script>
  // Calls /otp (Cloudflare Pages Function in same project)
  const OTP_ENDPOINT = '/otp';

  const frame       = document.getElementById('vdoFrame');
  const loadScreen  = document.getElementById('loadScreen');
  const errorScreen = document.getElementById('errorScreen');
  const errMsg      = document.getElementById('errMsg');
  const drmBadge    = document.getElementById('drmBadge');
  const lockBar     = document.getElementById('lockBar');
  const devWall     = document.getElementById('devWall');

  async function initPlayer() {
    errorScreen.style.display = 'none';
    loadScreen.classList.remove('hidden');
    frame.classList.remove('ready');
    drmBadge.classList.remove('show');
    lockBar.classList.remove('show');
    frame.src = 'about:blank';
    try {
      const res = await fetch(OTP_ENDPOINT, { method: 'POST' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Server error ${res.status}`);
      }
      const { otp, playbackInfo } = await res.json();
      if (!otp || !playbackInfo) throw new Error('Invalid OTP response');
      frame.src = `https://player.vdocipher.com/v2/?otp=${otp}&playbackInfo=${playbackInfo}&autoplay=1`;
    } catch (e) {
      loadScreen.classList.add('hidden');
      errMsg.textContent = e.message || 'Unknown error.';
      errorScreen.style.display = 'flex';
    }
  }

  frame.addEventListener('load', () => {
    if (!frame.src || frame.src === 'about:blank') return;
    loadScreen.classList.add('hidden');
    frame.classList.add('ready');
    drmBadge.classList.add('show');
    lockBar.classList.add('show');
  });

  initPlayer();

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    const blocked =
      (e.ctrlKey  && ['s','u','p','a','c','j','i'].includes(k)) ||
      (e.metaKey  && ['s','u','p','a','c','j','i'].includes(k)) ||
      (e.ctrlKey  && e.shiftKey && ['i','j','c','k'].includes(k)) ||
      (e.metaKey  && e.altKey   && ['i','j'].includes(k)) ||
      e.key === 'F12' || e.key === 'F5';
    if (blocked) { e.preventDefault(); e.stopPropagation(); }
  });
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('touchstart', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  let devOpen = false;
  setInterval(() => {
    const dw = window.outerWidth  - window.innerWidth  > 200;
    const dh = window.outerHeight - window.innerHeight > 200;
    if ((dw || dh) && !devOpen) {
      devOpen = true; devWall.style.display = 'flex'; frame.src = 'about:blank';
    } else if (!dw && !dh && devOpen) {
      devOpen = false; devWall.style.display = 'none'; initPlayer();
    }
  }, 1000);
</script>
</body>
</html>
